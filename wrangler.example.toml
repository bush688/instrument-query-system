name = "instrument-locator"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Replace with your own domain or remove routes for local-only testing.
routes = [
  { pattern = "instrument.example.com", custom_domain = true }
]

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "your-r2-bucket-name"

[[kv_namespaces]]
binding = "META"
id = "your-kv-namespace-id"

[vars]
API_VERSION = "1"
